# ERPClaw Web — nginx config for test1.erpclaw.ai
# Replaces the old webclaw nginx config

# ── Rate Limiting Zones ──────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=write_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

# ── HTTP → HTTPS redirect ───────────────────────────────────────────────────
server {
    listen 80;
    server_name test1.erpclaw.ai;
    return 301 https://$host$request_uri;
}

# ── HTTPS server ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name test1.erpclaw.ai;

    ssl_certificate /etc/ssl/certs/webclaw.crt;
    ssl_certificate_key /etc/ssl/private/webclaw.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # ── Global Security Headers ─────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

    # ── Payload Limits ──────────────────────────────────────────────────────
    client_max_body_size 10m;
    client_body_timeout 10s;
    client_header_timeout 10s;

    # ── Auth API (strict rate limit) ────────────────────────────────────────
    location /api/auth/ {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 35s;
    }

    # ── Action API (moderate rate limit for writes) ─────────────────────────
    location /api/action/ {
        limit_req zone=write_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 35s;
    }

    # ── General API ─────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 35s;
    }

    # ── Static frontend (SvelteKit build output) ────────────────────────────
    root /home/ubuntu/erpclaw-web/build;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache static assets ─────────────────────────────────────────────────
    location /_app/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
